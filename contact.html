<main>
  <section class="page-hero">
    <div class="container">
      <nav class="breadcrumb" aria-label="パンくず"><a href="/index.html">トップ</a><span>/</span><span>お問い合わせ</span></nav>
      <h1>お問い合わせ</h1>
    </div>
  </section>
  <section class="section">
    <div class="container">
      <form class="contact-form" id="contact-form">
        <p class="note" style="margin-bottom: 20px;">
        このフォームは、入力内容をメール本文に反映してメール作成画面を開くためのものです。送信はお使いのメールアプリから行ってください。
        </p>
        <div>
          <label for="name">氏名 <span>必須</span></label>
          <input id="name" name="name" type="text" required>
        </div>
        <div>
          <label for="organization">所属組織 <span>必須</span></label>
          <input id="organization" name="organization" type="text" required>
        </div>
        <div>
          <label for="email">メールアドレス <span>必須</span></label>
          <input id="email" name="email" type="email" required>
        </div>
        <div>
          <label for="type">お問い合わせ種別 <span>必須</span></label>
          <select id="type" name="type" required>
            <option value="">選択してください</option>
            <option>ご相談・ご依頼</option>
            <option>お見積依頼</option>
            <option>共同研究・実証実験に関する相談</option>
            <option>研修に関する相談</option>
            <option>その他</option>
          </select>
        </div>
        <div>
          <label for="schedule">想定している時期</label>
          <input id="schedule" name="schedule" type="text" placeholder="例：2026年8月頃、未定 など">
        </div>
        <div>
          <label for="message">相談内容（概要） <span>必須</span></label>
          <textarea id="message" name="message" rows="6" required placeholder="機密情報・個人情報・未公開研究情報の詳細は記載しないでください。目的・確認したいことの概要をご記載ください。"></textarea>
        </div>
        <button class="btn btn-primary" type="submit">メール作成画面を開く</button>
      </form>
    </div>
  </section>
</main>
